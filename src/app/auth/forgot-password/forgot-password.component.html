<div class="container mt-4">

  <h3>Forgot Password</h3>

  <form [formGroup]="form" (ngSubmit)="sendOtp()">

    <input
      type="email"
      formControlName="email"
      class="form-control mb-3"
      placeholder="Enter Email">

    <button
      class="btn btn-primary">
      Send OTP
    </button>

  </form>

</div>
