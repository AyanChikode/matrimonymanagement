<div class="container mt-4">

  <h3>New Password</h3>

  <form>

    <input
      type="password"
      formControlName="newPassword"
      placeholder="Enter New Password"
      class="form-control mb-3">

    <button
      type="button"
      class="btn btn-primary"
      (click)="updatePassword()">

      Update Password

    </button>

  </form>

</div>
