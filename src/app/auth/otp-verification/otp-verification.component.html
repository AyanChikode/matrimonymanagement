<div class="container mt-5">

  <div class="card p-4">

    <h3 class="text-center mb-4">

      OTP Verification

    </h3>

    <form
      [formGroup]="otpForm"
      (ngSubmit)="verifyOtp()">

      <div class="mb-3">

        <label>Email</label>

        <input
          type="email"
          class="form-control"
          formControlName="email">

      </div>

      <div class="mb-3">

        <label>OTP</label>

        <input
          type="number"
          class="form-control"
          formControlName="otp">

      </div>

      <button
        class="btn btn-success w-100">

        Verify OTP

      </button>

    </form>

  </div>

</div>
