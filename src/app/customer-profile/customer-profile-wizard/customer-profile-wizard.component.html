<div class="container mt-4">

<div class="card shadow">

<div class="card-body">

<h3>Create Matrimony Profile</h3>

<div class="mb-4">
  Step {{currentStep}} of 6

  <form [formGroup]="profileForm">

<div *ngIf="currentStep === 1">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Name</label>
      <input
        type="text"
        class="form-control"
        formControlName="customerName">
    </div>

    <div class="col-md-3 mb-3">
      <label>Age</label>
      <input
        type="number"
        class="form-control"
        formControlName="age">
    </div>

    <div class="col-md-3 mb-3">
      <label>Gender</label>
      <select
        class="form-control"
        formControlName="gender">

        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>

      </select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Phone Number</label>
      <input
        type="text"
        class="form-control"
        formControlName="phoneNo">
    </div>

    <div class="col-md-6 mb-3">
      <label>Marital Status</label>

      <select
        class="form-control"
        formControlName="maritalStatus">

        <option>Single</option>
        <option>Divorced</option>
        <option>Widowed</option>

      </select>

    </div>

  </div>

</div>

<div *ngIf="currentStep === 2">

  <div class="row">

    <div class="col-md-4 mb-3">

      <label>Religion</label>

      <select
        class="form-control"
        formControlName="religion_id">

        <option
          *ngFor="let r of religions"
          [value]="r.religion_id">

          {{r.religion_name}}

        </option>

      </select>

    </div>

    <div class="col-md-4 mb-3">

      <label>Caste</label>

      <select
        class="form-control"
        formControlName="caste_id">

        <option
          *ngFor="let c of castes"
          [value]="c.caste_id">

          {{c.caste_name}}

        </option>

      </select>

    </div>

    <div class="col-md-4 mb-3">

      <label>Subcaste</label>

      <select
        class="form-control"
        formControlName="subcaste_id">

        <option
          *ngFor="let s of subcastes"
          [value]="s.subcaste_id">

          {{s.subcaste_name}}

        </option>

      </select>

    </div>

  </div>

</div>


<div *ngIf="currentStep === 3">

  <div class="row">

    <div class="col-md-6 mb-3">

      <label>State</label>

      <select
        class="form-control"
        formControlName="state_id">

        <option
          *ngFor="let s of states"
          [value]="s.state_id">

          {{s.state_name}}

        </option>

      </select>

    </div>

    <div class="col-md-6 mb-3">

      <label>District</label>

      <select
        class="form-control"
        formControlName="district_id">

        <option
          *ngFor="let d of districts"
          [value]="d.district_id">

          {{d.district_name}}

        </option>

      </select>

    </div>

    <div class="col-md-6 mb-3">

      <label>Taluka</label>

      <select
        class="form-control"
        formControlName="taluka_id">

        <option
          *ngFor="let t of talukas"
          [value]="t.taluka_id">

          {{t.taluka_name}}

        </option>

      </select>

    </div>

    <div class="col-md-6 mb-3">

      <label>Village</label>

      <select
        class="form-control"
        formControlName="village_id">

        <option
          *ngFor="let v of villages"
          [value]="v.village_id">

          {{v.village_name}}

        </option>

      </select>

    </div>

    <div class="col-md-12 mb-3">

      <label>City</label>

      <input
        type="text"
        class="form-control"
        formControlName="city">

    </div>

  </div>

</div>

<div *ngIf="currentStep === 4">

  <div class="row">

    <div class="col-md-6 mb-3">

      <label>Education</label>

      <input
        type="text"
        class="form-control"
        formControlName="education">

    </div>

    <div class="col-md-6 mb-3">

      <label>Occupation</label>

      <input
        type="text"
        class="form-control"
        formControlName="occupation">

    </div>

    <div class="col-md-6 mb-3">

      <label>Income</label>

      <input
        type="number"
        class="form-control"
        formControlName="income">

    </div>

    <div class="col-md-6 mb-3">

      <label>Height</label>

      <input
        type="text"
        class="form-control"
        formControlName="height">

    </div>

  </div>

</div>

<div *ngIf="currentStep === 5">

  <label>Bio</label>

  <textarea
    rows="6"
    class="form-control"
    formControlName="bio">

  </textarea>

</div>

<div *ngIf="currentStep === 6">

  <div class="mb-3">

    <input
      type="file"
      class="form-control"
      (change)="onFileSelected($event)">

  </div>

  <img
    *ngIf="imagePreview"
    [src]="imagePreview"
    width="200"
    class="img-thumbnail">

</div>

<div class="mt-4">

  <button
    class="btn btn-secondary me-2"
    *ngIf="currentStep > 1"
    (click)="previousStep()">

    Previous

  </button>

  <button
    class="btn btn-primary"
    *ngIf="currentStep < 6"
    (click)="nextStep()">

    Next

  </button>

  <button
    class="btn btn-success"
    *ngIf="currentStep === 6"
    (click)="submitProfile()">

    Save Profile

  </button>

</div>

</form>

</div>
