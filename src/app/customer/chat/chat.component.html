<div class="container-fluid mt-3">

<div class="row">

<div class="col-md-4">

<div class="card">

<div class="card-header">

<h5>Matches</h5>

</div>

<ul class="list-group">

<li
class="list-group-item"

*ngFor="let m of matches"

(click)="openChat(

m.fromCustomer.id==currentCustomerId ?

m.toCustomer :

m.fromCustomer

)"

style="cursor:pointer"
>

<img
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
width="45"
height="45"
class="rounded-circle me-2">

{{

m.fromCustomer.id==currentCustomerId ?

m.toCustomer.customerName :

m.fromCustomer.customerName

}}

</li>

</ul>

</div>

</div>

<div class="col-md-8">

<div class="card">

<div class="card-header">

<h5>

{{selectedCustomer?.customerName}}

</h5>

</div>

<div
class="card-body"

style="height:450px;overflow:auto;"
>

<div

*ngFor="let msg of messages"

class="mb-2"

>

<div

[class.text-end]="

msg.sender.id==currentCustomerId

"

>

<span

class="badge"

[ngClass]="

msg.sender.id==currentCustomerId ?

'bg-success' :

'bg-secondary'

"

>

{{msg.message}}

</span>

</div>

</div>

</div>

<div class="card-footer">

<div class="input-group">

<input

type="text"

[(ngModel)]="message"

class="form-control"

placeholder="Type Message"

>

<button

class="btn btn-primary"

(click)="send()"

>

Send

</button>

</div>

</div>

</div>

</div>

</div>

</div>
