<div class="container-fluid">

  <!-- Profile Completion -->

  <div class="card mt-3">

    <div class="card-body">

      <h5>Profile Completion</h5>

      <div class="progress">

        <div
          class="progress-bar bg-success"
          [style.width.%]="profileCompletion">

          {{profileCompletion}}%

        </div>

      </div>

    </div>

  </div>

  <!-- Profile Card -->

  <div class="card mt-3">

    <div class="card-body">

      <div class="row">

        <div class="col-md-3 text-center">

          <img
            [src]="profile.profilePhoto"
            class="profile-image">

        </div>

        <div class="col-md-9">

          <h3>{{profile.customerName}}</h3>

          <p>Age : {{profile.age}}</p>

          <p>Education : {{profile.education}}</p>

          <p>Occupation : {{profile.occupation}}</p>

          <p>City : {{profile.city}}</p>

        </div>

      </div>

    </div>

  </div>

  <!-- Recent Profiles -->

  <div class="card mt-4">

    <div class="card-header">
      Recent Profiles
    </div>

    <div class="card-body">

      <table class="table">

        <thead>

          <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
            <th>Education</th>
          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let p of recentProfiles">

            <td>{{p.customerName}}</td>
            <td>{{p.age}}</td>
            <td>{{p.city}}</td>
            <td>{{p.education}}</td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
